<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain It</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;700&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-family: 'Outfit', sans-serif;
      font-weight: 100;
      font-size: 12px;
      pointer-events: none;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">click to place containers · rain fills them with sound</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script>
    // ── Setup ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    resize();

    // ── Color themes (time + weather) ──────────────────────────────────────
    const COLOR_THEMES = {
      morning:  { bg: '#0d1b4b', rain: 'rgba(180,210,255,0.6)' },
      afternoon:{ bg: '#2d1f0e', rain: 'rgba(255,220,160,0.5)' },
      evening:  { bg: '#2d0d2d', rain: 'rgba(255,180,220,0.5)' },
      night:    { bg: '#050510', rain: 'rgba(150,180,255,0.4)' },
    };

    function getTimeTheme() {
      const h = new Date().getHours();
      if (h >= 6  && h < 12) return 'morning';
      if (h >= 12 && h < 18) return 'afternoon';
      if (h >= 18 && h < 22) return 'evening';
      return 'night'; // 22~5
    }

    // Parse hex or rgba string → [r,g,b,a]
    function parseColor(c) {
      c = c.trim();
      if (c.startsWith('#')) {
        const hex = c.slice(1);
        const r = parseInt(hex.slice(0,2),16);
        const g = parseInt(hex.slice(2,4),16);
        const b = parseInt(hex.slice(4,6),16);
        return [r,g,b,1];
      }
      const m = c.match(/rgba?\(([^)]+)\)/);
      if (m) {
        const parts = m[1].split(',').map(Number);
        return [parts[0],parts[1],parts[2], parts[3]??1];
      }
      return [26,26,26,1];
    }

    function lerpColor(a, b, t) {
      const ca = parseColor(a), cb = parseColor(b);
      const r = ca[0] + (cb[0]-ca[0])*t;
      const g = ca[1] + (cb[1]-ca[1])*t;
      const bl= ca[2] + (cb[2]-ca[2])*t;
      const al= ca[3] + (cb[3]-ca[3])*t;
      return `rgba(${r|0},${g|0},${bl|0},${al.toFixed(3)})`;
    }

    // Weather type: 'sunny' | 'rainy' | 'cloudy' | null
    let weatherType = null;

    function getTargetBg() {
      const theme = COLOR_THEMES[getTimeTheme()];
      let bg = theme.bg;
      if (weatherType === 'sunny') {
        // slightly brighter variant
        const c = parseColor(bg);
        bg = `rgb(${Math.min(255,(c[0]+18)|0)},${Math.min(255,(c[1]+18)|0)},${Math.min(255,(c[2]+18)|0)})`;
      } else if (weatherType === 'cloudy') {
        // desaturate toward grey
        const c = parseColor(bg);
        const avg = ((c[0]+c[1]+c[2])/3)|0;
        bg = `rgb(${((c[0]+avg)/2)|0},${((c[1]+avg)/2)|0},${((c[2]+avg)/2)|0})`;
      } else if (weatherType === 'rainy') {
        // darker
        const c = parseColor(bg);
        bg = `rgb(${Math.max(0,(c[0]-10)|0)},${Math.max(0,(c[1]-10)|0)},${Math.max(0,(c[2]-10)|0)})`;
      }
      return bg;
    }

    function getTargetRainColor() {
      return COLOR_THEMES[getTimeTheme()].rain;
    }

    let currentBg   = COLOR_THEMES[getTimeTheme()].bg;
    let currentRain = COLOR_THEMES[getTimeTheme()].rain;

    // Update hint position to sit below ground line
    function updateHintPosition() {
      const groundY = window.innerHeight - 40;
      const hint = document.getElementById('hint');
      hint.style.bottom = '';
      hint.style.top    = (groundY + 20) + 'px';
    }
    updateHintPosition();
    window.addEventListener('resize', updateHintPosition);

    // ── Matter.js ──────────────────────────────────────────────────────────
    const { Engine, Runner, World, Bodies, Body, Events, Composite } = Matter;
    const engine = Engine.create();
    engine.gravity.y = 1;
    const runner = Runner.create();
    Runner.run(runner, engine);

    // Boundaries (ground + walls)
    const ground = Bodies.rectangle(
      window.innerWidth / 2, window.innerHeight - 40,
      window.innerWidth, 20,
      { isStatic: true, label: 'ground', friction: 0.8 }
    );
    const wallL = Bodies.rectangle(-25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true, label: 'wall' });
    const wallR = Bodies.rectangle(window.innerWidth + 25, window.innerHeight / 2, 50, window.innerHeight * 2, { isStatic: true, label: 'wall' });
    World.add(engine.world, [ground, wallL, wallR]);

    window.addEventListener('resize', () => {
      resize();
      Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight - 40 });
      Body.setPosition(wallR, { x: window.innerWidth + 25, y: window.innerHeight / 2 });
    });

    // ── Tone.js synth pools ────────────────────────────────────────────────
    // Shared reverb
    const reverb = new Tone.Reverb({ decay: 2.5, wet: 0.4 }).toDestination();

    // [Change 5] Pool-based synths — round-robin, no new() on every collision
    const synthPool = {
      circle:    Array.from({length:4}, () => new Tone.FMSynth({ harmonicity:3,  modulationIndex:10, envelope:{attack:0.01,decay:0.3,sustain:0,release:0.5} }).connect(reverb)),
      square:    Array.from({length:4}, () => new Tone.FMSynth({ harmonicity:1,  modulationIndex:20, envelope:{attack:0.01,decay:0.3,sustain:0,release:0.5} }).connect(reverb)),
      triangle:  Array.from({length:4}, () => new Tone.FMSynth({ harmonicity:5,  modulationIndex:5,  envelope:{attack:0.01,decay:0.3,sustain:0,release:0.5} }).connect(reverb)),
      membrane:  Array.from({length:2}, () => new Tone.MembraneSynth().toDestination()),
      metal:     Array.from({length:2}, () => new Tone.MetalSynth({ frequency:400, envelope:{attack:0.001,decay:0.1} }).connect(reverb)),
    };
    const poolIdx = { circle:0, square:0, triangle:0, membrane:0, metal:0 };
    [...synthPool.circle, ...synthPool.square, ...synthPool.triangle].forEach(s => s.volume.value = -12);

    function poolGet(type) {
      const pool = synthPool[type];
      const s = pool[poolIdx[type] % pool.length];
      poolIdx[type]++;
      return s;
    }

    // PluckSynth for latin text, MetalSynth (pooled) for chinese text
    const pluckSynth = new Tone.PluckSynth().connect(reverb);
    pluckSynth.volume.value = -8;
    // Single MetalSynth for han text (separate from storm pool)
    const metalSynthHan = new Tone.MetalSynth({ frequency:200, envelope:{attack:0.001,decay:0.4,release:0.2}, harmonicity:5.1, modulationIndex:32, resonance:4000, octaves:1.5 }).connect(reverb);
    metalSynthHan.volume.value = -14;

    // [Change 4] Pad synth for plants
    const padSynth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: 'sine' },
      envelope: { attack: 0.5, decay: 0.3, sustain: 0.8, release: 2 }
    }).connect(reverb);
    padSynth.volume.value = -10;

    // Time-based scale selection
    const hour = new Date().getHours();
    let currentScale;
    if (hour >= 6 && hour <= 11) {
      currentScale = [60,62,64,67,69,72,74,76]; // morning: pentatonic major
    } else if (hour >= 12 && hour <= 17) {
      currentScale = [60,62,64,65,67,69,71,72]; // afternoon: natural major
    } else if (hour >= 18 && hour <= 21) {
      currentScale = [60,62,63,65,67,69,70,72]; // evening: dorian
    } else {
      currentScale = [60,62,63,65,67,68,70,72]; // night: natural minor
    }

    function midiToNote(midi) {
      const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const octave = Math.floor(midi / 12) - 1;
      return notes[midi % 12] + octave;
    }

    function getNote(yPos) {
      const idx = Math.floor((1 - yPos / window.innerHeight) * currentScale.length);
      const midi = currentScale[Math.max(0, Math.min(idx, currentScale.length - 1))];
      return midiToNote(midi);
    }

    function noteForBody(body) {
      return getNote(body.position.y);
    }

    // Pad notes C3–C5
    const PAD_NOTES = ['C3','E3','G3','B3','C4','E4','G4','B4','C5'];

    function padNoteForHeight(h) {
      // h: 20–100 → PAD_NOTES index
      const t = Math.max(0, Math.min(1, (h - 20) / 80));
      return PAD_NOTES[Math.round(t * (PAD_NOTES.length - 1))];
    }

    // ── Container / text object tracking ──────────────────────────────────
    const containers = [];
    const raindrops  = [];
    let shapeIndex = 0;
    const SHAPES  = ['circle', 'square', 'triangle'];
    const PALETTE = ['#FF3366','#FF6B00','#FFD700','#00FF88','#00CFFF','#7B2FFF','#FF2FD4','#FF4444'];
    const charPools = {
      latin:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      digits:  '0123456789',
      ascii:   '!@#$%&*?+=-~^<>[]{}|/',
      hanzi:   '雨水风云山石木火土金日月星河海',
      symbols: '♦♠♣♥★☆◆◇○●□■△▽'
    };
    function pickChar(str) { return str[Math.floor(Math.random() * str.length)]; }

    function addContainer(x, y) {
      // [Change 3] Avoid spawning too close to plants
      let safeX = x;
      for (const p of plants) {
        if (Math.abs(safeX - p.x) < 60) {
          safeX += safeX < p.x ? -70 : 70;
        }
      }
      const safeY = Math.min(y, window.innerHeight - 100);
      const color  = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      const alpha  = (0.7 + Math.random() * 0.2).toFixed(2);
      const scaleFactor = Math.min(1, window.innerWidth / 800);

      // 40% chance: text object
      if (Math.random() < 0.4) {
        const rand = Math.random();
        let charType, char;
        if (rand < 0.25)      { charType = 'latin';   char = pickChar(charPools.latin); }
        else if (rand < 0.40) { charType = 'hanzi';   char = pickChar(charPools.hanzi); }
        else if (rand < 0.55) { charType = 'digits';  char = pickChar(charPools.digits); }
        else if (rand < 0.75) { charType = 'ascii';   char = pickChar(charPools.ascii); }
        else                  { charType = 'symbols'; char = pickChar(charPools.symbols); }
        const isHan = charType === 'hanzi';
        const font  = isHan ? 'Noto Sans SC' : 'Outfit';
        const fontSize = Math.floor((Math.pow(Math.random(), 0.5) * 80 + 40) * scaleFactor);
        const bw = fontSize * 0.85;
        const bh = fontSize * 1.0;
        const body = Bodies.rectangle(safeX, safeY, bw, bh, {
          restitution: 0.25, friction: 0.5, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
        body._type     = 'text';
        body._char     = char;
        body._font     = font;
        body._fontSize = fontSize;
        body._color    = color;
        body._alpha    = alpha;
        body._isHan    = isHan;
        body._charType = charType;
        body._size     = Math.max(bw, bh);
        // [Change 2] Random initial rotation and angular velocity
        Body.setAngle(body, (Math.random() - 0.5) * 0.5);
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
        World.add(engine.world, body);
        containers.push({ body, type: 'text', char, font, color });
        return;
      }

      // 60% chance: shape object
      const shape = SHAPES[shapeIndex % SHAPES.length];
      shapeIndex++;
      const size = (Math.random() * 80 + 60) * scaleFactor;
      let body;
      if (shape === 'circle') {
        body = Bodies.circle(safeX, safeY, size / 2, {
          restitution: 0.2, friction: 0.6, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
      } else {
        body = Bodies.rectangle(safeX, safeY, size, size, {
          restitution: 0.2, friction: 0.6, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
      }
      body._type  = 'shape';
      body._shape = shape;
      body._size  = size;
      body._color = color;
      body._alpha = alpha;
      // [Change 2] Random initial rotation and angular velocity
      Body.setAngle(body, (Math.random() - 0.5) * 0.5);
      Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
      World.add(engine.world, body);
      containers.push({ body, shape, size });
    }

    // ── Splash particles ───────────────────────────────────────────────────
    let splashes = [];

    // ── Walker (umbrella person) ───────────────────────────────────────────
    let walker = null;
    const walkerParts = {};
    const walkerPartNames = ['body','head','arm_left','arm_right','leg_left','leg_right'];
    let walkerPartsLoaded = 0;
    walkerPartNames.forEach(name => {
      walkerParts[name] = new Image();
      walkerParts[name].onload = () => walkerPartsLoaded++;
      walkerParts[name].src = name + '.svg';
    });
    let walkerNextSpawn = Date.now() + (3 + Math.random() * 2) * 1000;

    const hitSampler = new Tone.Sampler({
      urls: { "A4": ahBase64 },
      release: 0.8,
    }).toDestination();

    function playHitSound() {
      Tone.start();
      const notes = ["C3","D3","E3","F3","G3","A3","B3","C4","D4","E4","F4","G4","A4","B4","C5"];
      const note = notes[Math.floor(Math.random() * notes.length)];
      try { hitSampler.triggerAttackRelease(note, "8n"); } catch(_) {}
    }

    // ahSynth for body hit sound (lazy-init after Tone.start)
    let ahSynth = null;
    function getAhSynth() {
      if (!ahSynth) {
        try {
          ahSynth = new Tone.AMSynth({
            harmonicity: 2,
            oscillator: { type: 'sine' },
            envelope: { attack: 0.08, decay: 0.2, sustain: 0.5, release: 1.2 },
            modulation: { type: 'sine' },
            modulationEnvelope: { attack: 0.1, decay: 0.2, sustain: 0.3, release: 0.8 }
          }).connect(reverb);
        } catch(_) {}
      }
      return ahSynth;
    }

    function spawnWalker() {
      const groundY = window.innerHeight - 40;
      const dir = Math.random() < 0.5 ? 1 : -1;
      const x = dir === 1 ? -30 : window.innerWidth + 30;
      const speed = 0.8 + Math.random() * 0.7;
      const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      const uc = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      walker = { x, y: groundY, groundY, dir, speed, color, umbrellaColor: uc, hitTimer: 0, active: true };
      const w = walker;
      w.angles = { legL: 0, legR: 0, armL: -0.2, armR: 0, bounce: 0 };
      const stride = 0.5, armSwing = 0.35, dur = 0.45;
      function walkCycle(w) {
        if (!w.active) return;
        gsap.to(w.angles, {
          legL: stride, legR: -stride,
          armL: -0.2 + armSwing * 0.15, armR: -armSwing,
          bounce: -3,
          duration: dur, ease: 'power1.inOut',
          onComplete: () => {
            if (!w.active) return;
            gsap.to(w.angles, {
              legL: -stride, legR: stride,
              armL: -0.2 - armSwing * 0.15, armR: armSwing,
              bounce: -3,
              duration: dur, ease: 'power1.inOut',
              onComplete: () => walkCycle(w)
            });
          }
        });
      }
      walkCycle(w);
      console.log('walker spawned', walker);
    }

    function updateWalker() {
      if (!walker) {
        if (Date.now() >= walkerNextSpawn) spawnWalker();
        return;
      }
      if (walker.hitTimer > 0) walker.hitTimer--;
      walker.x += walker.speed * walker.dir;
      // off-screen → remove, schedule next
      if ((walker.dir === 1 && walker.x > window.innerWidth + 50) ||
          (walker.dir === -1 && walker.x < -50)) {
        walker.active = false;
        gsap.killTweensOf(walker.angles);
        walker = null;
        walkerNextSpawn = Date.now() + (40 + Math.random() * 25) * 1000;
      }
    }

    // ── Storm mode ─────────────────────────────────────────────────────────
    let stormMode = false;

    function scheduleStorm() {
      const delay = (8 + Math.random() * 7) * 1000;
      setTimeout(() => {
        stormMode = true;
        const duration = (3 + Math.random() * 2) * 1000;
        setTimeout(() => {
          stormMode = false;
          scheduleStorm();
        }, duration);
      }, delay);
    }
    scheduleStorm();

    // ── Wind force ─────────────────────────────────────────────────────────
    let windForce = 0;
    let windGustActive = false;

    function scheduleWind() {
      const delay = (5 + Math.random() * 5) * 1000;
      setTimeout(() => {
        if (!windGustActive) {
          if (Math.random() < 0.05) {
            windGustActive = true;
            windForce = (Math.random() * 0.004) - 0.002;
            const gustDuration = (2 + Math.random() * 1) * 1000;
            setTimeout(() => {
              windGustActive = false;
              windForce = (Math.random() * 0.001) - 0.0005;
            }, gustDuration);
          } else {
            windForce = (Math.random() * 0.001) - 0.0005;
          }
        }
        scheduleWind();
      }, delay);
    }
    scheduleWind();

    Events.on(engine, 'beforeUpdate', () => {
      if (windForce === 0) return;
      Composite.allBodies(engine.world).forEach(body => {
        if (!body.isStatic) {
          Body.applyForce(body, body.position, { x: windForce * body.mass, y: 0 });
        }
      });
    });

    // ── Rain spawner ───────────────────────────────────────────────────────
    function spawnRain() {
      const x = Math.random() * window.innerWidth;
      const w = stormMode ? 3 : 2;
      const drop = Bodies.rectangle(x, -10, w, 8, {
        restitution: 0, friction: 0, frictionAir: 0.01,
        label: 'rain'
      });
      drop._born = Date.now();
      if (windForce !== 0) {
        Body.setVelocity(drop, { x: windForce * 80, y: 0 });
      }
      World.add(engine.world, drop);
      raindrops.push({ body: drop });

      const delay = stormMode
        ? 50 + Math.random() * 50
        : 300 + Math.random() * 300;
      setTimeout(spawnRain, delay);
    }

    // ── Chord / note mechanism ─────────────────────────────────────────────
    let pendingNotes = [];
    let chordTimer   = null;

    function flushChord() {
      const notes = pendingNotes.splice(0);
      notes.forEach(({ note, shape, textType, isStorm }) => {
        try {
          if (textType === 'hanzi') {
            metalSynthHan.triggerAttackRelease('16n');
          } else if (textType === 'latin' || textType === 'digits') {
            pluckSynth.triggerAttackRelease(note);
          } else if (textType === 'ascii' || textType === 'symbols') {
            // ascii/symbols → FMSynth circle pool (harmonicity:3)
            const s = poolGet('circle');
            s.triggerAttackRelease(note, '16n');
          } else {
            // shape containers
            const s = poolGet(shape || 'circle');
            s.triggerAttackRelease(note, '16n');
            if (isStorm) {
              const r = Math.random();
              if (r < 0.3) {
                poolGet('membrane').triggerAttackRelease('C1', '8n');
              } else if (r < 0.5) {
                poolGet('metal').triggerAttackRelease('16n');
              }
            }
          }
        } catch(_) {}
      });
      chordTimer = null;
    }

    function scheduleNote(note, shape, textType) {
      pendingNotes.push({ note, shape, textType, isStorm: stormMode });
      if (chordTimer) clearTimeout(chordTimer);
      chordTimer = setTimeout(flushChord, 100);
    }

    // ── Collision: rain hits container → play note ─────────────────────────
    const recentHits = new WeakMap();

    Events.on(engine, 'collisionStart', e => {
      e.pairs.forEach(pair => {
        let rain = null, container = null;
        if (pair.bodyA.label === 'rain' && pair.bodyB.label === 'container') {
          rain = pair.bodyA; container = pair.bodyB;
        } else if (pair.bodyB.label === 'rain' && pair.bodyA.label === 'container') {
          rain = pair.bodyB; container = pair.bodyA;
        }
        if (rain && container) {
          const now  = Date.now();
          const last = recentHits.get(container) || 0;
          if (now - last > 80) {
            recentHits.set(container, now);
            const note = noteForBody(container);
            if (container._type === 'text') {
              scheduleNote(note, null, container._charType || (container._isHan ? 'hanzi' : 'latin'));
            } else {
              const shape = container._shape || 'circle';
              scheduleNote(note, shape, null);
            }
          }
          // splash on container hit
          const cp1 = pair.collision.supports[0] || rain.position;
          for (let i = 0; i < 4; i++) {
            splashes.push({ x: cp1.x, y: cp1.y, vx: (Math.random()-0.5)*3, vy: -Math.random()*3-1, life: 1.0 });
          }
          World.remove(engine.world, rain);
          const idx = raindrops.findIndex(r => r.body === rain);
          if (idx !== -1) raindrops.splice(idx, 1);
        }

        // rain hits ground → remove
        if (
          (pair.bodyA.label === 'rain' && pair.bodyB.label === 'ground') ||
          (pair.bodyB.label === 'rain' && pair.bodyA.label === 'ground')
        ) {
          const rain2 = pair.bodyA.label === 'rain' ? pair.bodyA : pair.bodyB;
          // splash on ground hit
          const cp2 = pair.collision.supports[0] || rain2.position;
          for (let i = 0; i < 4; i++) {
            splashes.push({ x: cp2.x, y: cp2.y, vx: (Math.random()-0.5)*3, vy: -Math.random()*3-1, life: 1.0 });
          }

          // ── Walker umbrella / body hit check ──────────────────────────
          if (walker) {
            const rx = rain2.position.x, ry = rain2.position.y;
            // Recompute walker geometry (mirrors drawWalker, sc=0.32)
            const sc = 0.32;
            const bW = 55.5*sc, bH = 118.35*sc;
            const aLW = 179.22*sc, aLH = 214.49*sc;
            const lLH = 145.29*sc;
            const bounce = walker.angles ? (walker.angles.bounce || 0) : 0;
            const cx = walker.x;
            const gY = walker.groundY;
            const bodyTop = gY - lLH - bH * 0.85 + bounce;
            // arm_left pivot (holds umbrella)
            const armPivotX = cx - bW*0.3;
            const armPivotY = bodyTop + bH*0.1;
            // umbrella top edge = pivot - aLH*0.537
            const umbrellaTop = armPivotY - aLH*0.537;
            // umbrella left edge = pivot - aLW*0.7265 (1 - 0.2735)
            const umbrellaLeft = armPivotX - aLW*0.7265;
            // umbrella right edge = pivot + aLW*0.2735 (roughly)
            const umbrellaRight = armPivotX + aLW*0.2735;
            // full bounding box: umbrella top → feet, umbrella left → body right
            const bbTop    = umbrellaTop;
            const bbBottom = gY;
            const bbLeft   = umbrellaLeft;
            const bbRight  = Math.max(umbrellaRight, cx + bW*0.5);

            if (rx >= bbLeft && rx <= bbRight && ry >= bbTop && ry <= bbBottom) {
              // determine if rain hit umbrella zone (above bodyTop) or body zone
              if (ry < bodyTop) {
                // rain hit umbrella → pluck note + splashes
                try {
                  const midi = currentScale[Math.floor(Math.random() * currentScale.length)];
                  const note = Tone.Frequency(midi, 'midi').toNote();
                  pluckSynth.triggerAttackRelease(note);
                } catch(_) {}
                for (let i = 0; i < 3; i++) {
                  splashes.push({ x: rx, y: ry, vx: (Math.random()-0.5)*3, vy: -Math.random()*2-1, life: 1.0 });
                }
              } else {
                // rain hit body/legs
                walker.hitTimer = 10;
                playHitSound();
              }
            }
          }
          // ─────────────────────────────────────────────────────────────

          World.remove(engine.world, rain2);
          const idx = raindrops.findIndex(r => r.body === rain2);
          if (idx !== -1) raindrops.splice(idx, 1);
        }
      });
    });

    // ── Click → place container ────────────────────────────────────────────
    canvas.addEventListener('click', async e => {
      await Tone.start();
      addContainer(e.clientX, e.clientY);
    });

    // ── Plants ─────────────────────────────────────────────────────────────
    // [Change 3] Plants have height property, grow over time
    // [Change 4] Plants trigger pad sound on growth
    const plants = [];

    function triggerPadSound(plant) {
      try {
        const note = padNoteForHeight(plant.height);
        padSynth.triggerAttackRelease(note, '1n');
      } catch(_) {}
    }

    function spawnPlant() {
      const delay = (8 + Math.random() * 7) * 1000;
      setTimeout(() => {
        if (plants.length < 3) {
          const groundY = window.innerHeight - 40;
          const x = 40 + Math.random() * (window.innerWidth - 80);
          const type = Math.random() < 0.5 ? 'grass' : 'flower';
          const color = type === 'grass' ? '#7FD47F' : PALETTE[Math.floor(Math.random() * PALETTE.length)];
          // [Change 3] Initial height 20–40px
          const initHeight = 20 + Math.random() * 20;
          // [Change 1] Grass: 2–3 stems with fixed offsets (no random per frame)
          const stemCount = type === 'grass' ? (2 + Math.floor(Math.random() * 2)) : 1;
          // Pre-compute stem offsets so they don't jitter each frame
          const stemOffsets = Array.from({length: stemCount}, () => ({
            cx: (Math.random() - 0.5) * 14,
            tx: (Math.random() - 0.5) * 10,
          }));
          const plant = { x, groundY, type, color, height: initHeight, stemOffsets, growProgress: 0 };
          plants.push(plant);

          // Schedule growth intervals
          function scheduleGrowth() {
            const growDelay = (10 + Math.random() * 10) * 1000; // 10–20s
            setTimeout(() => {
              if (plant.height < 100) {
                plant.height = Math.min(100, plant.height + 10 + Math.random() * 10);
                triggerPadSound(plant);
              }
              scheduleGrowth();
            }, growDelay);
          }
          scheduleGrowth();
        }
        spawnPlant();
      }, delay);
    }
    spawnPlant();

    // ── Time & Weather overlay ─────────────────────────────────────────────
    let weatherCache = null; // { icon, temp } or null
    let lastTimeStr  = '';
    let lastTimeMin  = -1;

    function getModeLabel() {
      const h = new Date().getHours();
      if (h >= 5  && h < 12) return 'pentatonic';
      if (h >= 12 && h < 17) return 'major';
      if (h >= 17 && h < 20) return 'dorian';
      return 'minor';
    }

    function mapWeatherDesc(desc) {
      const d = desc.toLowerCase();
      if (d.includes('sunny') || d.includes('clear'))  return '☀️';
      if (d.includes('cloud') || d.includes('overcast')) return '☁️';
      if (d.includes('rain') || d.includes('drizzle')) return '🌧';
      if (d.includes('snow') || d.includes('blizzard')) return '❄️';
      return '🌤';
    }

    (async function fetchWeather() {
      try {
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 4000);
        const res  = await fetch('https://wttr.in/?format=j1', { signal: controller.signal });
        clearTimeout(tid);
        const data = await res.json();
        const cond = data.current_condition[0];
        const icon = mapWeatherDesc(cond.weatherDesc[0].value);
        const temp = cond.temp_C;
        weatherCache = { icon, temp };
      } catch(_) { /* fail silently */ }
    })();

    function drawOverlay() {
      const now = new Date();
      const min = now.getMinutes();
      if (min !== lastTimeMin) {
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(min).padStart(2, '0');
        lastTimeStr = `${hh}:${mm}`;
        lastTimeMin = min;
      }
      const mode = getModeLabel();
      const line2 = weatherCache
        ? `${mode} · ${weatherCache.icon} ${weatherCache.temp}°C`
        : mode;

      ctx.save();
      ctx.font         = "100 12px 'Outfit', sans-serif";
      ctx.fillStyle    = 'rgba(255,255,255,0.5)';
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(lastTimeStr, 20, 30);
      ctx.fillText(line2,       20, 48);
      ctx.restore();
    }

    // ── Rendering ──────────────────────────────────────────────────────────
    function drawBody(body) {
      const pos   = body.position;
      const angle = body.angle;
      const color = body._color || '#47a8e8';
      const alpha = body._alpha || 0.8;

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle);
      ctx.globalAlpha = parseFloat(alpha);

      if (body._type === 'text') {
        const fs   = body._fontSize || 48;
        const font = body._font || 'Outfit';
        ctx.font      = `bold ${fs}px '${font}', sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(body._char, 0, 0);
      } else {
        const shape = body._shape;
        const size  = body._size || 8;
        ctx.beginPath();
        if (shape === 'circle') {
          ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
        } else if (shape === 'square') {
          const h = size / 2;
          ctx.rect(-h, -h, size, size);
        } else if (shape === 'triangle') {
          const r = size / 2;
          ctx.moveTo(0, -r);
          ctx.lineTo( r * 0.866,  r * 0.5);
          ctx.lineTo(-r * 0.866,  r * 0.5);
          ctx.closePath();
        }
        ctx.fillStyle = color;
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawRain(body) {
      const pos = body.position;
      ctx.save();
      ctx.strokeStyle = currentRain;
      ctx.lineWidth   = stormMode ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 4);
      ctx.lineTo(pos.x, pos.y + 4);
      ctx.stroke();
      ctx.restore();
    }

    // Plant rendering: wind sway, round leaf tips, separate flower color
    function drawPlant(plant) {
      const { x, groundY, type, color, height, stemOffsets, growProgress } = plant;
      const progress = Math.min(growProgress, 1);
      const h = height * progress;
      const swayX = windForce * height * 80;
      ctx.save();
      if (type === 'grass') {
        stemOffsets.forEach(off => {
          const tipX = x + off.tx + swayX;
          const tipY = groundY - h;
          // Curved stem with wind sway
          ctx.beginPath();
          ctx.moveTo(x, groundY);
          ctx.quadraticCurveTo(
            x + off.cx + swayX * 0.5, groundY - h * 0.55,
            tipX, tipY
          );
          ctx.strokeStyle = '#7FD47F';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Round leaf tip (circle instead of triangle)
          if (progress > 0.5) {
            ctx.beginPath();
            ctx.arc(tipX, tipY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#7FD47F';
            ctx.fill();
          }
        });
      } else {
        // Flower: curved stem with wind sway
        const tipX = x + swayX;
        const tipY = groundY - h;
        ctx.beginPath();
        ctx.moveTo(x, groundY);
        ctx.quadraticCurveTo(
          x + swayX * 0.5, groundY - h * 0.5,
          tipX, tipY
        );
        ctx.strokeStyle = '#7FD47F';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Flower head at stem tip, using plant.color (not stem green)
        if (progress > 0.8) {
          ctx.beginPath();
          ctx.arc(tipX, tipY, 8, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawWindIndicator() {
      if (Math.abs(windForce) < 0.0002) return;
      const cx     = window.innerWidth / 2;
      const cy     = 22;
      const maxLen = 60;
      const len    = Math.abs(windForce) / 0.002 * maxLen;
      const dir    = windForce > 0 ? 1 : -1;
      const x1     = cx - dir * len * 0.5;
      const x2     = cx + dir * len * 0.5;
      const opacity = 0.3 + Math.abs(windForce) / 0.002 * 0.4;

      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${Math.min(opacity, 0.7).toFixed(2)})`;
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(x1, cy);
      ctx.lineTo(x2, cy);
      ctx.stroke();
      const aw = 5;
      ctx.beginPath();
      ctx.moveTo(x2, cy);
      ctx.lineTo(x2 - dir * aw, cy - aw * 0.6);
      ctx.moveTo(x2, cy);
      ctx.lineTo(x2 - dir * aw, cy + aw * 0.6);
      ctx.stroke();
      ctx.restore();
    }

    function drawWalker(w) {
      if (walkerPartsLoaded < walkerPartNames.length) return;

      const sc = 0.32;
      const x = w.x;
      const gY = w.groundY;
      const bounce = w.angles.bounce || 0;
      const shake = w.hitTimer > 0 ? (Math.random()-0.5)*2 : 0;

      const bW = 55.5*sc,  bH = 118.35*sc;
      const hW = 50.12*sc, hH = 50.12*sc;
      const aLW = 179.22*sc, aLH = 214.49*sc;
      const aRW = 54.21*sc, aRH = 99.55*sc;
      const lLH = 145.29*sc, lRH = 145.33*sc, lW = 43.05*sc;

      ctx.save();
      if (w.dir === -1) {
        ctx.translate(x * 2, 0);
        ctx.scale(-1, 1);
      }

      const cx = x + shake;
      const bodyTop = gY - lLH - bH * 0.85 + bounce;

      // 后腿
      ctx.save();
      ctx.translate(cx + bW*0.15, gY - lRH);
      ctx.rotate(w.angles.legR);
      ctx.drawImage(walkerParts['leg_right'], -lW*0.5, 0, lW, lRH);
      ctx.restore();

      // 后手臂
      ctx.save();
      ctx.translate(cx + bW*0.35, bodyTop + bH*0.15);
      ctx.rotate(w.angles.armR);
      ctx.drawImage(walkerParts['arm_right'], -aRW*0.5, 0, aRW, aRH);
      ctx.restore();

      // 身体（前倾 0.07 rad）
      ctx.save();
      ctx.translate(cx, bodyTop + bH * 0.5);
      ctx.rotate(0.07);
      ctx.drawImage(walkerParts['body'], -bW*0.5, -bH*0.5, bW, bH);
      ctx.restore();

      // 前腿
      ctx.save();
      ctx.translate(cx - bW*0.15, gY - lLH);
      ctx.rotate(w.angles.legL);
      ctx.drawImage(walkerParts['leg_left'], -lW*0.5, 0, lW, lLH);
      ctx.restore();

      // 前手臂（arm_left，举伞）
      const armPivotX = cx - bW*0.3;
      const armPivotY = bodyTop + bH*0.1;
      const armAngle = w.angles.armL;
      ctx.save();
      ctx.translate(armPivotX, armPivotY);
      ctx.rotate(armAngle);
      ctx.drawImage(walkerParts['arm_left'], -aLW*0.2735, -aLH*0.537, aLW, aLH);
      ctx.restore();

      // 头
      ctx.drawImage(walkerParts['head'], cx - hW*0.5 + shake, bodyTop - hH*0.8, hW, hH);


      ctx.restore();
      if (w.hitTimer > 0) w.hitTimer--;
    }

    function loop() {
      // Lerp background and rain colors toward target
      currentBg   = lerpColor(currentBg,   getTargetBg(),        0.005);
      currentRain = lerpColor(currentRain, getTargetRainColor(), 0.005);

      // Rainy weather forces storm mode
      if (weatherType === 'rainy' && !stormMode) stormMode = true;

      // Fill background
      ctx.fillStyle = currentBg;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // Ground line
      const gy = window.innerHeight - 40;
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(window.innerWidth, gy);
      ctx.stroke();

      drawWindIndicator();

      // Plants (behind containers)
      plants.forEach(p => {
        if (p.growProgress < 1) {
          p.growProgress += 0.02;
          // [Change 4] Trigger pad on first full growth
          if (p.growProgress >= 1 && !p._padPlayed) {
            p._padPlayed = true;
            triggerPadSound(p);
          }
        }
        drawPlant(p);
      });

      containers.forEach(c => drawBody(c.body));
      raindrops.forEach(r => drawRain(r.body));

      // Draw splash particles
      splashes.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.15;
        s.life -= 0.08;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${s.life * 0.6})`;
        ctx.fill();
      });
      splashes = splashes.filter(s => s.life > 0);

      // Walker update + draw
      updateWalker();
      if (walker) drawWalker(walker);

      drawOverlay();

      requestAnimationFrame(loop);
    }

    // ── Cleanup: stale raindrops + off-screen bodies every 30s ────────────
    // [Change 5] Also remove off-screen raindrop rigid bodies every 30s
    setInterval(() => {
      const now = Date.now();
      for (let i = raindrops.length - 1; i >= 0; i--) {
        const r = raindrops[i];
        if (now - r.body._born > 8000 || r.body.position.y > window.innerHeight + 50) {
          World.remove(engine.world, r.body);
          raindrops.splice(i, 1);
        }
      }
    }, 2000);

    setInterval(() => {
      // Remove any raindrop bodies that escaped off-screen
      const bodies = Composite.allBodies(engine.world);
      bodies.forEach(b => {
        if (b.label === 'rain' && b.position.y > window.innerHeight + 100) {
          World.remove(engine.world, b);
          const idx = raindrops.findIndex(r => r.body === b);
          if (idx !== -1) raindrops.splice(idx, 1);
        }
      });
    }, 30000);

    // ── Start ──────────────────────────────────────────────────────────────
    spawnRain();
    loop();
  </script>
</body>
</html>
