<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain It</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Noto+Sans+SC:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hint">click to place containers · rain fills them with sound</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
  <script>
    // ── Setup ──────────────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();

    // ── Matter.js ──────────────────────────────────────────────────────────
    const { Engine, Runner, World, Bodies, Body, Events, Composite } = Matter;
    const engine = Engine.create();
    engine.gravity.y = 1;
    const runner = Runner.create();
    Runner.run(runner, engine);

    // Boundaries (ground + walls)
    const ground = Bodies.rectangle(
      canvas.width / 2, canvas.height - 40,
      canvas.width, 20,
      { isStatic: true, label: 'ground', friction: 0.8 }
    );
    const wallL = Bodies.rectangle(-25, canvas.height / 2, 50, canvas.height * 2, { isStatic: true, label: 'wall' });
    const wallR = Bodies.rectangle(canvas.width + 25, canvas.height / 2, 50, canvas.height * 2, { isStatic: true, label: 'wall' });
    World.add(engine.world, [ground, wallL, wallR]);

    window.addEventListener('resize', () => {
      resize();
      Body.setPosition(ground, { x: canvas.width / 2, y: canvas.height - 40 });
      Body.setPosition(wallR, { x: canvas.width + 25, y: canvas.height / 2 });
    });

    // ── Tone.js synths ─────────────────────────────────────────────────────
    // Shared reverb for non-drum synths
    const reverb = new Tone.Reverb({ decay: 2.5, wet: 0.4 }).toDestination();

    // FMSynth per shape, all connected to reverb
    const synths = {
      circle:   new Tone.FMSynth({ harmonicity: 3,  modulationIndex: 10, envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.5 } }).connect(reverb),
      square:   new Tone.FMSynth({ harmonicity: 1,  modulationIndex: 20, envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.5 } }).connect(reverb),
      triangle: new Tone.FMSynth({ harmonicity: 5,  modulationIndex: 5,  envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.5 } }).connect(reverb),
    };
    Object.values(synths).forEach(s => s.volume.value = -12);

    // PluckSynth for latin text, MetalSynth for chinese text — both through reverb
    const pluckSynth = new Tone.PluckSynth().connect(reverb);
    pluckSynth.volume.value = -8;
    const metalSynth = new Tone.MetalSynth({ frequency: 200, envelope: { attack: 0.001, decay: 0.4, release: 0.2 }, harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5 }).connect(reverb);
    metalSynth.volume.value = -14;

    // Scale notes C4–C6
    const NOTES = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5','A5','B5','C6'];

    function noteForBody(body) {
      const groundY = canvas.height - 40;
      const maxH = groundY - 60;
      const t = Math.max(0, Math.min(1, 1 - (body.position.y / maxH)));
      const idx = Math.round(t * (NOTES.length - 1));
      return NOTES[idx];
    }

    // ── Container / text object tracking ──────────────────────────────────
    const containers = []; // { body, shape } or { body, type:'text', char, font, color }
    const raindrops  = []; // { body }
    let shapeIndex = 0;
    const SHAPES  = ['circle', 'square', 'triangle'];
    const PALETTE = ['#FF3366','#FF6B00','#FFD700','#00FF88','#00CFFF','#7B2FFF','#FF2FD4','#FF4444'];
    const HAN_CHARS = '雨水风云山石木火土金';

    function addContainer(x, y) {
      const safeY = Math.min(y, canvas.height - 100);
      const color  = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      const alpha  = (0.7 + Math.random() * 0.2).toFixed(2);

      // 40% chance: text object
      if (Math.random() < 0.4) {
        const isHan  = Math.random() < 0.3;
        const char   = isHan
          ? HAN_CHARS[Math.floor(Math.random() * HAN_CHARS.length)]
          : String.fromCharCode(65 + Math.floor(Math.random() * 26));
        const font   = isHan ? 'Noto Sans SC' : 'Outfit';
        // Bigger font range: 40–120px, skewed toward larger
        const fontSize = Math.floor(Math.pow(Math.random(), 0.5) * 80 + 40);
        // bounding box approx: fontSize wide, fontSize tall
        const bw = fontSize * 0.85;
        const bh = fontSize * 1.0;
        const body = Bodies.rectangle(x, safeY, bw, bh, {
          restitution: 0.25, friction: 0.5, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
        body._type     = 'text';
        body._char     = char;
        body._font     = font;
        body._fontSize = fontSize;
        body._color    = color;
        body._alpha    = alpha;
        body._isHan    = isHan;
        body._size     = Math.max(bw, bh);
        World.add(engine.world, body);
        containers.push({ body, type: 'text', char, font, color });
        return;
      }

      // 60% chance: shape object
      const shape = SHAPES[shapeIndex % SHAPES.length];
      shapeIndex++;
      const size = 60 + Math.random() * 80;
      let body;
      if (shape === 'circle') {
        body = Bodies.circle(x, safeY, size / 2, {
          restitution: 0.2, friction: 0.6, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
      } else {
        body = Bodies.rectangle(x, safeY, size, size, {
          restitution: 0.2, friction: 0.6, label: 'container',
          collisionFilter: { category: 0x0004, mask: 0x0001 | 0x0002 | 0x0004 }
        });
      }
      body._type  = 'shape';
      body._shape = shape;
      body._size  = size;
      body._color = color;
      body._alpha = alpha;
      World.add(engine.world, body);
      containers.push({ body, shape, size });
    }

    // ── Storm mode ─────────────────────────────────────────────────────────
    let stormMode = false;

    function scheduleStorm() {
      const delay = (8 + Math.random() * 7) * 1000; // 8–15s
      setTimeout(() => {
        stormMode = true;
        const duration = (3 + Math.random() * 2) * 1000; // 3–5s
        setTimeout(() => {
          stormMode = false;
          scheduleStorm();
        }, duration);
      }, delay);
    }
    scheduleStorm();

    // ── Wind force ─────────────────────────────────────────────────────────
    // Mostly gentle breeze; 5% chance of a strong gust lasting 2–3s
    let windForce = 0;
    let windGustActive = false;

    function scheduleWind() {
      const delay = (5 + Math.random() * 5) * 1000; // 5–10s between changes
      setTimeout(() => {
        if (!windGustActive) {
          if (Math.random() < 0.05) {
            // Strong gust
            windGustActive = true;
            windForce = (Math.random() * 0.004) - 0.002; // -0.002 ~ 0.002
            const gustDuration = (2 + Math.random() * 1) * 1000; // 2–3s
            setTimeout(() => {
              windGustActive = false;
              windForce = (Math.random() * 0.001) - 0.0005; // back to gentle
            }, gustDuration);
          } else {
            // Gentle breeze
            windForce = (Math.random() * 0.001) - 0.0005; // -0.0005 ~ 0.0005
          }
        }
        scheduleWind();
      }, delay);
    }
    scheduleWind();

    // Apply wind every physics tick
    Events.on(engine, 'beforeUpdate', () => {
      if (windForce === 0) return;
      Composite.allBodies(engine.world).forEach(body => {
        if (!body.isStatic) {
          Body.applyForce(body, body.position, { x: windForce * body.mass, y: 0 });
        }
      });
    });

    // ── Rain spawner ───────────────────────────────────────────────────────
    function spawnRain() {
      const x = Math.random() * canvas.width;
      const w = stormMode ? 3 : 2;
      const drop = Bodies.rectangle(x, -10, w, 8, {
        restitution: 0, friction: 0, frictionAir: 0.01,
        label: 'rain'
      });
      drop._born = Date.now();
      // Wind affects initial horizontal velocity
      if (windForce !== 0) {
        Body.setVelocity(drop, { x: windForce * 80, y: 0 });
      }
      World.add(engine.world, drop);
      raindrops.push({ body: drop });

      const delay = stormMode
        ? 50 + Math.random() * 50
        : 300 + Math.random() * 300;
      setTimeout(spawnRain, delay);
    }

    // ── Chord / note mechanism ─────────────────────────────────────────────
    let pendingNotes = [];
    let chordTimer   = null;

    function flushChord() {
      const notes = pendingNotes.splice(0);
      notes.forEach(({ note, shape, textType, isStorm }) => {
        try {
          if (textType === 'han') {
            metalSynth.triggerAttackRelease('16n');
          } else if (textType === 'latin') {
            pluckSynth.triggerAttackRelease(note);
          } else {
            // shape synth (FMSynth)
            const s = synths[shape] || synths.circle;
            s.triggerAttackRelease(note, '16n');
            // storm percussion — MembraneSynth direct (no reverb)
            if (isStorm) {
              const r = Math.random();
              if (r < 0.3) {
                new Tone.MembraneSynth().toDestination().triggerAttackRelease('C1', '8n');
              } else if (r < 0.5) {
                new Tone.MetalSynth({ frequency: 400, envelope: { attack: 0.001, decay: 0.1 } }).connect(reverb).triggerAttackRelease('16n');
              }
            }
          }
        } catch(_) {}
      });
      chordTimer = null;
    }

    function scheduleNote(note, shape, textType) {
      pendingNotes.push({ note, shape, textType, isStorm: stormMode });
      if (chordTimer) clearTimeout(chordTimer);
      chordTimer = setTimeout(flushChord, 100);
    }

    // ── Collision: rain hits container → play note ─────────────────────────
    const recentHits = new WeakMap();

    Events.on(engine, 'collisionStart', e => {
      e.pairs.forEach(pair => {
        let rain = null, container = null;
        if (pair.bodyA.label === 'rain' && pair.bodyB.label === 'container') {
          rain = pair.bodyA; container = pair.bodyB;
        } else if (pair.bodyB.label === 'rain' && pair.bodyA.label === 'container') {
          rain = pair.bodyB; container = pair.bodyA;
        }
        if (rain && container) {
          const now  = Date.now();
          const last = recentHits.get(container) || 0;
          if (now - last > 80) {
            recentHits.set(container, now);
            const note = noteForBody(container);
            if (container._type === 'text') {
              scheduleNote(note, null, container._isHan ? 'han' : 'latin');
            } else {
              const shape = container._shape || 'circle';
              scheduleNote(note, shape, null);
            }
          }
          World.remove(engine.world, rain);
          const idx = raindrops.findIndex(r => r.body === rain);
          if (idx !== -1) raindrops.splice(idx, 1);
        }

        // rain hits ground → remove
        if (
          (pair.bodyA.label === 'rain' && pair.bodyB.label === 'ground') ||
          (pair.bodyB.label === 'rain' && pair.bodyA.label === 'ground')
        ) {
          const rain2 = pair.bodyA.label === 'rain' ? pair.bodyA : pair.bodyB;
          World.remove(engine.world, rain2);
          const idx = raindrops.findIndex(r => r.body === rain2);
          if (idx !== -1) raindrops.splice(idx, 1);
        }
      });
    });

    // ── Click → place container ────────────────────────────────────────────
    canvas.addEventListener('click', async e => {
      await Tone.start();
      addContainer(e.clientX, e.clientY);
    });

    // ── Plants (visual only) ───────────────────────────────────────────────
    const plants = [];

    function spawnPlant() {
      const delay = (8 + Math.random() * 7) * 1000; // 8–15s
      setTimeout(() => {
        if (plants.length < 3) {
          const groundY = canvas.height - 40;
          const x = 40 + Math.random() * (canvas.width - 80);
          const type = Math.random() < 0.5 ? 'grass' : 'flower';
          const color = type === 'grass' ? '#7FD47F' : PALETTE[Math.floor(Math.random() * PALETTE.length)];
          const height = 30 + Math.random() * 40; // 30–70px tall
          const stems = type === 'grass' ? (3 + Math.floor(Math.random() * 3)) : 1; // 3–5 stems for grass
          plants.push({ x, groundY, type, color, height, stems, growProgress: 0 });
        }
        spawnPlant();
      }, delay);
    }
    spawnPlant();

    // ── Rendering ──────────────────────────────────────────────────────────
    function drawBody(body) {
      const pos   = body.position;
      const angle = body.angle;
      const color = body._color || '#47a8e8';
      const alpha = body._alpha || 0.8;

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle);
      ctx.globalAlpha = parseFloat(alpha);

      if (body._type === 'text') {
        const fs   = body._fontSize || 48;
        const font = body._font || 'Outfit';
        ctx.font      = `bold ${fs}px '${font}', sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(body._char, 0, 0);
      } else {
        const shape = body._shape;
        const size  = body._size || 8;
        ctx.beginPath();
        if (shape === 'circle') {
          ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
        } else if (shape === 'square') {
          const h = size / 2;
          ctx.rect(-h, -h, size, size);
        } else if (shape === 'triangle') {
          const r = size / 2;
          ctx.moveTo(0, -r);
          ctx.lineTo( r * 0.866,  r * 0.5);
          ctx.lineTo(-r * 0.866,  r * 0.5);
          ctx.closePath();
        }
        ctx.fillStyle = color;
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function drawRain(body) {
      const pos = body.position;
      ctx.save();
      ctx.strokeStyle = stormMode ? 'rgba(180,220,255,0.7)' : 'rgba(255,255,255,0.55)';
      ctx.lineWidth   = stormMode ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 4);
      ctx.lineTo(pos.x, pos.y + 4);
      ctx.stroke();
      ctx.restore();
    }

    function drawPlant(plant) {
      const { x, groundY, type, color, height, stems, growProgress } = plant;
      const progress = Math.min(growProgress, 1);
      ctx.save();
      if (type === 'grass') {
        for (let i = 0; i < stems; i++) {
          ctx.beginPath();
          ctx.moveTo(x, groundY);
          ctx.quadraticCurveTo(
            x + (Math.random() - 0.5) * 20,
            groundY - height * 0.5 * progress,
            x + (Math.random() - 0.5) * 15,
            groundY - height * progress
          );
          ctx.strokeStyle = '#7FD47F';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      } else {
        // stem
        ctx.beginPath();
        ctx.moveTo(x, groundY);
        ctx.lineTo(x, groundY - height * progress);
        ctx.strokeStyle = '#7FD47F';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // flower head appears after 80% growth
        if (progress > 0.8) {
          ctx.beginPath();
          ctx.arc(x, groundY - height, 8, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawWindIndicator() {
      if (Math.abs(windForce) < 0.0002) return;
      const cx     = canvas.width / 2;
      const cy     = 22;
      const maxLen = 60;
      const len    = Math.abs(windForce) / 0.002 * maxLen;
      const dir    = windForce > 0 ? 1 : -1;
      const x1     = cx - dir * len * 0.5;
      const x2     = cx + dir * len * 0.5;
      const opacity = 0.3 + Math.abs(windForce) / 0.002 * 0.4;

      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${Math.min(opacity, 0.7).toFixed(2)})`;
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(x1, cy);
      ctx.lineTo(x2, cy);
      ctx.stroke();
      // arrowhead
      const aw = 5;
      ctx.beginPath();
      ctx.moveTo(x2, cy);
      ctx.lineTo(x2 - dir * aw, cy - aw * 0.6);
      ctx.moveTo(x2, cy);
      ctx.lineTo(x2 - dir * aw, cy + aw * 0.6);
      ctx.stroke();
      ctx.restore();
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Ground line
      const gy = canvas.height - 40;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(canvas.width, gy);
      ctx.stroke();

      // Wind indicator
      drawWindIndicator();

      // Plants (behind containers)
      plants.forEach(p => {
        if (p.growProgress < 1) p.growProgress += 0.02;
        drawPlant(p);
      });

      // Containers / text objects
      containers.forEach(c => drawBody(c.body));

      // Raindrops
      raindrops.forEach(r => drawRain(r.body));

      requestAnimationFrame(loop);
    }

    // ── Cleanup stale raindrops ────────────────────────────────────────────
    setInterval(() => {
      const now = Date.now();
      for (let i = raindrops.length - 1; i >= 0; i--) {
        const r = raindrops[i];
        if (now - r.body._born > 8000 || r.body.position.y > canvas.height + 50) {
          World.remove(engine.world, r.body);
          raindrops.splice(i, 1);
        }
      }
    }, 2000);

    // ── Start ──────────────────────────────────────────────────────────────
    spawnRain();
    loop();
  </script>
</body>
</html>
